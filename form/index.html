<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Registration Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #EEEEEE;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333333;
            padding: 30px 16px;
        }

        .wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2C3E50;
            font-size: 22px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .form-card {
            background-color: #FFFFFF;
            border: 1px solid #BDC3C7;
            border-radius: 6px;
            padding: 30px;
        }

        /* Section */
        .section {
            margin-bottom: 28px;
        }

        .section h2 {
            color: #2C3E50;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section hr {
            border: none;
            border-top: 1px solid #BDC3C7;
            margin-bottom: 16px;
        }

        /* Field row */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 5px;
            color: #333333;
            font-weight: bold;
            font-size: 13px;
        }

        .field label .req {
            color: #e74c3c;
            margin-left: 2px;
        }

        .field input[type="text"],
        .field input[type="email"],
        .field input[type="tel"],
        .field input[type="date"],
        .field input[type="number"],
        .field select,
        .field textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #BDC3C7;
            border-radius: 4px;
            font-size: 14px;
            color: #333333;
            background-color: #FFFFFF;
            outline: none;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: #34495E;
        }

        .field textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Two columns */
        .row-2 {
            display: flex;
            gap: 16px;
        }

        .row-2 .field {
            flex: 1;
        }

        /* Radio group */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 2px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
        }

        /* Declaration */
        .declaration-field {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 24px;
        }

        .declaration-field input[type="checkbox"] {
            margin-top: 3px;
            width: 15px;
            height: 15px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .declaration-field label {
            font-size: 13px;
            color: #333333;
            line-height: 1.5;
            cursor: pointer;
        }

        /* Buttons */
        .form-actions {
            display: flex;
            gap: 12px;
        }

        .btn-register {
            padding: 10px 28px;
            background-color: #34495E;
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-register:hover {
            background-color: #2C3E50;
        }

        .btn-reset {
            padding: 10px 28px;
            background-color: #FFFFFF;
            color: #34495E;
            border: 1px solid #34495E;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset:hover {
            background-color: #EEEEEE;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .row-2 {
                flex-direction: column;
                gap: 0;
            }

            .form-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <h1>Student Course Registration Form</h1>

    <div class="form-card">
        <form action="#" method="post">

            <!-- 1. Personal Information -->
            <div class="section">
                <h2>Personal Information</h2>
                <hr>

                <div class="field">
                    <label for="fullName">Full Name <span class="req">*</span></label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="dob">Date of Birth <span class="req">*</span></label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="field">
                        <label>Gender <span class="req">*</span></label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="gender" value="male" required> Male
                            </label>
                            <label>
                                <input type="radio" name="gender" value="female"> Female
                            </label>
                            <label>
                                <input type="radio" name="gender" value="other"> Other
                            </label>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label for="guardianName">Guardian Name <span class="req">*</span></label>
                    <input type="text" id="guardianName" name="guardianName" placeholder="Enter guardian's full name" required>
                </div>
            </div>

            <!-- 2. Contact Information -->
            <div class="section">
                <h2>Contact Information</h2>
                <hr>

                <div class="row-2">
                    <div class="field">
                        <label for="email">Email <span class="req">*</span></label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="field">
                        <label for="phone">Phone <span class="req">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000" required>
                    </div>
                </div>

                <div class="field">
                    <label for="address">Address <span class="req">*</span></label>
                    <textarea id="address" name="address" placeholder="House No., Street, Locality" required></textarea>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="city">City <span class="req">*</span></label>
                        <input type="text" id="city" name="city" placeholder="City" required>
                    </div>
                    <div class="field">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state" placeholder="State">
                    </div>
                </div>

                <div class="field">
                    <label for="pin">PIN Code <span class="req">*</span></label>
                    <input type="number" id="pin" name="pin" placeholder="000000" maxlength="6" required>
                </div>
            </div>

            <!-- 3. Academic Information -->
            <div class="section">
                <h2>Academic Information</h2>
                <hr>

                <div class="field">
                    <label for="school">School / College <span class="req">*</span></label>
                    <input type="text" id="school" name="school" placeholder="Name of your institution" required>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="classYear">Class / Year <span class="req">*</span></label>
                        <input type="text" id="classYear" name="classYear" placeholder="e.g. 12th / 2nd Year" required>
                    </div>
                    <div class="field">
                        <label for="qualification">Qualification <span class="req">*</span></label>
                        <select id="qualification" name="qualification" required>
                            <option value="" disabled selected>Select</option>
                            <option value="10th">10th</option>
                            <option value="12th">12th</option>
                            <option value="diploma">Diploma</option>
                            <option value="bachelors">Bachelor's</option>
                            <option value="masters">Master's</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 4. Course Details -->
            <div class="section">
                <h2>Course Details</h2>
                <hr>

                <div class="field">
                    <label for="course">Course <span class="req">*</span></label>
                    <select id="course" name="course" required>
                        <option value="" disabled selected>Select a course</option>
                        <option value="webdev">Web Development</option>
                        <option value="python">Python Programming</option>
                        <option value="dataScience">Data Science</option>
                        <option value="ai_ml">AI & Machine Learning</option>
                        <option value="graphic">Graphic Design</option>
                        <option value="digital">Digital Marketing</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="mode">Mode <span class="req">*</span></label>
                        <select id="mode" name="mode" required>
                            <option value="" disabled selected>Select</option>
                            <option value="online">Online</option>
                            <option value="offline">Offline</option>
                            <option value="hybrid">Hybrid</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="batch">Batch</label>
                        <select id="batch" name="batch">
                            <option value="" disabled selected>Select</option>
                            <option value="morning">Morning (8AM–11AM)</option>
                            <option value="afternoon">Afternoon (12PM–3PM)</option>
                            <option value="evening">Evening (4PM–7PM)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 5. Additional Information -->
            <div class="section">
                <h2>Additional Information</h2>
                <hr>

                <div class="field">
                    <label for="reason">Reason for Joining</label>
                    <textarea id="reason" name="reason" placeholder="Why do you want to join this course?"></textarea>
                </div>

                <div class="field">
                    <label for="experience">Previous Experience</label>
                    <textarea id="experience" name="experience" placeholder="Any relevant prior experience or skills"></textarea>
                </div>
            </div>

            <!-- 6. Declaration -->
            <div class="section">
                <h2>Declaration</h2>
                <hr>

                <div class="declaration-field">
                    <input type="checkbox" id="declaration" name="declaration" required>
                    <label for="declaration">
                        I hereby declare that all the information provided above is true and correct to the best of my knowledge.
                        I agree to abide by the institution's rules and regulations.
                    </label>
                </div>
            </div>

            <!-- Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn-register">Register</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
